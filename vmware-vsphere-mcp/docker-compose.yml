services:
  vsphere-mcp-server:
    image: ghcr.io/giuliolibrando/vmware-vsphere-mcp-server:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vsphere-mcp-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      VCENTER_HOST: ${VCENTER_HOST}
      VCENTER_USER: ${VCENTER_USER}
      VCENTER_PASSWORD: ${VCENTER_PASSWORD}
      INSECURE: ${INSECURE:-True}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
    restart: unless-stopped
    networks:
      - vsphere-mcp-network

networks:
  vsphere-mcp-network:
    driver: bridge
