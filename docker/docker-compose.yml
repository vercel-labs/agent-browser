# Docker Compose for building browserfleet
# Usage: docker compose -f docker/docker-compose.yml run build-linux
#        docker compose -f docker/docker-compose.yml run build-windows
#
# Note: macOS builds should be done natively on macOS for compatibility.

services:
  # Build for Linux platforms
  build-linux:
    build:
      context: ..
      dockerfile: docker/Dockerfile.build
    volumes:
      - ../cli:/build
      - ../bin:/output
    command: |
      -c '
        set -e
        echo "Building for Linux platforms (parallel)..."
        
        # Build both targets in parallel
        (echo "→ Linux x64" && cargo zigbuild --release --target x86_64-unknown-linux-gnu && cp /build/target/x86_64-unknown-linux-gnu/release/browserfleet /output/browserfleet-linux-x64 && chmod +x /output/browserfleet-linux-x64 && echo "✓ Linux x64 done") &
        PID1=$!
        
        (echo "→ Linux ARM64" && cargo zigbuild --release --target aarch64-unknown-linux-gnu && cp /build/target/aarch64-unknown-linux-gnu/release/browserfleet /output/browserfleet-linux-arm64 && chmod +x /output/browserfleet-linux-arm64 && echo "✓ Linux ARM64 done") &
        PID2=$!
        
        # Wait for both to complete
        wait $PID1 $PID2
        
        echo ""
        echo "✓ Linux platforms built successfully!"
        ls -la /output/browserfleet-linux-*
      '

  # Build for Windows
  build-windows:
    build:
      context: ..
      dockerfile: docker/Dockerfile.build
    volumes:
      - ../cli:/build
      - ../bin:/output
    command: |
      -c '
        set -e
        echo "Building for Windows x64..."
        
        cargo build --release --target x86_64-pc-windows-gnu
        cp /build/target/x86_64-pc-windows-gnu/release/browserfleet.exe /output/browserfleet-win32-x64.exe
        
        echo ""
        echo "✓ Windows build completed!"
        ls -la /output/browserfleet-win32-*
      '

  # Build for a single target (override with TARGET env var)
  build-single:
    build:
      context: ..
      dockerfile: docker/Dockerfile.build
    volumes:
      - ../cli:/build
      - ../bin:/output
    environment:
      - TARGET=${TARGET:-x86_64-unknown-linux-gnu}
      - OUTPUT_NAME=${OUTPUT_NAME:-browserfleet-linux-x64}
    command: |
      -c '
        cargo zigbuild --release --target $TARGET
        cp /build/target/$TARGET/release/browserfleet* /output/$OUTPUT_NAME
        chmod +x /output/$OUTPUT_NAME 2>/dev/null || true
        echo "✓ Built $OUTPUT_NAME"
      '
