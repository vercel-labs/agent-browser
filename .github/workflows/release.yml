name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  check-release:
    name: Check for new version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      needs_github_release: ${{ steps.check.outputs.needs_github_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Check package.json version against GitHub releases
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "Local version: $LOCAL_VERSION"

          TAG="v$LOCAL_VERSION"
          if gh release view "$TAG" &>/dev/null; then
            RELEASE_VERSION="$LOCAL_VERSION"
          else
            RELEASE_VERSION="0.0.0"
          fi
          echo "release version: $RELEASE_VERSION"

          if [ "$LOCAL_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Version changed: $RELEASE_VERSION -> $LOCAL_VERSION"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "needs_github_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version already released on GitHub, skipping build"
            echo "should_release=false" >> "$GITHUB_OUTPUT"

            # Check if GitHub release exists; it may be missing if a prior run
            # published to npm but failed before creating the release.
            TAG="v$LOCAL_VERSION"
            if gh release view "$TAG" &>/dev/null; then
              echo "GitHub release $TAG exists"
              echo "needs_github_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "GitHub release $TAG is missing, will rebuild and create it"
              echo "needs_github_release=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.name }}
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true' || needs.check-release.outputs.needs_github_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            build_target: x86_64-unknown-linux-gnu.2.28
            binary: agent-browser-priv-linux-x64
            use_zigbuild: true
          - name: Linux ARM64
            os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            build_target: aarch64-unknown-linux-gnu.2.28
            binary: agent-browser-priv-linux-arm64
            use_zigbuild: true
          # Windows support is temporarily disabled. Keep the release lane
          # details here so it can be restored later without rework.
          # - name: Windows x64
          #   os: ubuntu-latest
          #   rust_target: x86_64-pc-windows-gnu
          #   build_target: x86_64-pc-windows-gnu
          #   binary: agent-browser-priv-win32-x64.exe
          #   use_zigbuild: false
          - name: macOS ARM64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            build_target: aarch64-apple-darwin
            binary: agent-browser-priv-darwin-arm64
            use_zigbuild: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version
        run: pnpm run version:sync

      - name: Build dashboard
        run: pnpm --filter dashboard build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install cross-compilation tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-x86-64-linux-gnu

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild --version 0.22.3 --locked

      - name: Configure Rust linkers
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: cli

      - name: Build with zigbuild
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --manifest-path cli/Cargo.toml --target ${{ matrix.build_target }}

      - name: Build with cargo
        if: '!matrix.use_zigbuild'
        run: cargo build --release --manifest-path cli/Cargo.toml --target ${{ matrix.rust_target }}

      - name: Copy binary
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.rust_target }}" == *"windows"* ]]; then
            cp cli/target/${{ matrix.rust_target }}/release/agent-browser.exe artifacts/${{ matrix.binary }}
          else
            cp cli/target/${{ matrix.rust_target }}/release/agent-browser artifacts/${{ matrix.binary }}
            chmod +x artifacts/${{ matrix.binary }}
          fi

      - name: Verify Linux GNU glibc floor
        if: matrix.binary == 'agent-browser-priv-linux-x64' || matrix.binary == 'agent-browser-priv-linux-arm64'
        run: |
          set -euo pipefail
          if objdump -p artifacts/${{ matrix.binary }} | grep -E 'GLIBC_2\.([3-9][0-9]|29)'; then
            echo "ERROR: ${{ matrix.binary }} requires glibc newer than 2.28"
            exit 1
          fi
          objdump -p artifacts/${{ matrix.binary }} | sed -n '/Version References:/,$p'

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: artifacts/${{ matrix.binary }}
          retention-days: 7

  publish:
    name: Prepare npm package
    needs: [check-release, build-binaries]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Move binaries to bin directory
        run: |
          mkdir -p bin
          find artifacts -type f -name 'agent-browser-priv-*' -exec mv {} bin/ \;
          rm -rf artifacts
          chmod +x bin/agent-browser-priv-* 2>/dev/null || true
          echo "Binaries in bin/:"
          ls -la bin/

      - name: Verify all binaries exist
        run: |
          EXPECTED_BINARIES=(
            "agent-browser-priv-linux-x64"
            "agent-browser-priv-linux-arm64"
            "agent-browser-priv-darwin-arm64"
          )
          MIN_SIZE=100000
          ERRORS=0
          for binary in "${EXPECTED_BINARIES[@]}"; do
            if [ ! -f "bin/$binary" ]; then
              echo "ERROR: Missing bin/$binary"
              ERRORS=$((ERRORS + 1))
            else
              SIZE=$(stat -c%s "bin/$binary" 2>/dev/null || stat -f%z "bin/$binary")
              if [ "$SIZE" -lt "$MIN_SIZE" ]; then
                echo "ERROR: bin/$binary is too small ($SIZE bytes, expected >= $MIN_SIZE)"
                ERRORS=$((ERRORS + 1))
              else
                echo "OK: bin/$binary ($SIZE bytes)"
              fi
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Error: $ERRORS binary issues found"
            exit 1
          fi
          echo "All 3 platform binaries present and valid"

      - name: Publish to npm
        run: npm publish --tag latest --provenance --access public

  github-release:
    name: Create GitHub Release
    needs: [check-release, build-binaries]
    if: always() && needs.build-binaries.result == 'success' && needs.check-release.outputs.needs_github_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Move binaries to bin directory
        run: |
          mkdir -p bin
          find artifacts -type f -name 'agent-browser-priv-*' -exec mv {} bin/ \;
          rm -rf artifacts
          chmod +x bin/agent-browser-priv-* 2>/dev/null || true
          ls -la bin/

      - name: Verify binaries exist
        run: |
          BINARY_COUNT=$(ls bin/agent-browser-priv-* 2>/dev/null | wc -l)
          if [ "$BINARY_COUNT" -lt 3 ]; then
            echo "Error: Expected 3 binaries, found $BINARY_COUNT"
            ls -la bin/
            exit 1
          fi
          echo "Found $BINARY_COUNT binaries"

      - name: Extract changelog entry
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          awk '/<!-- release:start -->/{found=1; next} /<!-- release:end -->/{found=0} found{print}' CHANGELOG.md > /tmp/release-notes.md

          LINES=$(wc -l < /tmp/release-notes.md | tr -d ' ')
          if [ "$LINES" -lt 2 ]; then
            echo "Error: No release notes found between <!-- release:start --> and <!-- release:end --> markers in CHANGELOG.md"
            exit 1
          fi
          echo "Extracted release notes for $VERSION ($LINES lines)"

      - name: Create GitHub Release
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          TAG="v$VERSION"

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, uploading assets..."
            gh release upload "$TAG" bin/agent-browser-priv-* --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              bin/agent-browser-priv-*
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew-tap:
    name: Update Homebrew Tap
    needs: [check-release, github-release]
    if: always() && needs.github-release.result == 'success' && needs.check-release.outputs.needs_github_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check tap token
        id: tap-token
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping tap update."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source repository
        if: steps.tap-token.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          path: source

      - name: Checkout Homebrew tap
        if: steps.tap-token.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          repository: liuwen/homebrew-agent-browser-priv
          token: ${{ env.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Setup Node.js
        if: steps.tap-token.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: source/.node-version

      - name: Update formula from release assets
        if: steps.tap-token.outputs.configured == 'true'
        run: |
          node source/scripts/update-homebrew-formula.mjs \
            --version "${{ needs.check-release.outputs.version }}" \
            --formula tap/Formula/agent-browser.rb

      - name: Validate formula syntax
        if: steps.tap-token.outputs.configured == 'true'
        run: ruby -c tap/Formula/agent-browser.rb

      - name: Commit and push formula
        if: steps.tap-token.outputs.configured == 'true'
        working-directory: tap
        run: |
          if git diff --quiet -- Formula/agent-browser.rb; then
            echo "Homebrew formula already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-browser.rb
          git commit -m "agent-browser ${{ needs.check-release.outputs.version }}"
          git push
